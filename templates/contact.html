<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- Variables de couleurs --- */
        :root {
            --primary-red: #ff3333;
            --deep-crimson: #8a0303;
            --dark-bg: #0a0000; /* Fond encore plus noir pour le contraste */
            --text-light: #ffffff;
            --text-muted: #b38b8b;
            --glitch-cyan: #00ffff; /* Couleur secondaire pour l'effet glitch */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Nouvelle police appliquée partout */
            font-family: 'Red Hat Display', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow-x: hidden; position: relative;
        }

        /* --- L'arrière-plan (inchangé) --- */
        .dark-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 30% 20%, var(--deep-crimson) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, #3a0000 0%, transparent 50%),
                        linear-gradient(45deg, var(--dark-bg) 30%, #1f0000 70%);
            filter: brightness(0.8);
        }
        .dark-background::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none; mix-blend-mode: overlay;
        }

        /* --- Le Conteneur Principal --- */
        .contact-card {
            background: rgba(18, 1, 1, 0.9);
            border-radius: 16px; /* Un peu plus carré pour le style tech */
            padding: 45px 35px; width: 100%; max-width: 480px;
            border: 1px solid rgba(255, 51, 51, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(138, 3, 3, 0.15);
            backdrop-filter: blur(10px); position: relative;
            overflow: hidden;
        }

        /* =========================================
           EFFET GLITCH CSS AVANCÉ (Pour le Titre)
        ========================================= */
        .glitch-title {
            font-weight: 900; /* Très gras pour l'impact */
            font-size: 2.5rem;
            text-align: center; margin-bottom: 8px; color: var(--text-light);
            letter-spacing: 2px; position: relative;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
            /* L'animation se lance toutes les 5 secondes pendant 0.6s */
            animation: glitch-skew 5s infinite linear alternate-reverse;
        }

        /* Création des deux "fantômes" du texte (Rouge et Cyan) */
        .glitch-title::before, .glitch-title::after {
            content: attr(data-text); /* Récupère le texte du HTML */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 1, 1, 0.9); /* Cache le vrai texte derrière */
        }
        
        /* Couche Rouge (décalée à gauche) */
        .glitch-title::before {
            left: -2px;
            text-shadow: 2px 0 var(--primary-red);
            clip-path: inset(0 0 0 0);
            animation: glitch-anim-1 5s infinite linear alternate-reverse;
        }
        /* Couche Cyan (décalée à droite) */
        .glitch-title::after {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-cyan);
            clip-path: inset(0 0 0 0);
            animation: glitch-anim-2 5s infinite linear alternate-reverse;
        }

        /* Keyframes : Les découpages aléatoires du texte */
        /* L'astuce est de laisser de longues pauses (ex: de 5% à 95%) où rien ne se passe */
        @keyframes glitch-anim-1 {
            0%, 95% { clip-path: inset(50% 0 30% 0); }
            1%, 96% { clip-path: inset(10% 0 60% 0); }
            2%, 97% { clip-path: inset(80% 0 5% 0); }
            3%, 98% { clip-path: inset(20% 0 70% 0); }
            4%, 99% { clip-path: inset(60% 0 10% 0); }
            5%, 100% { clip-path: inset(0 0 0 0); }
        }
        @keyframes glitch-anim-2 {
            0%, 95% { clip-path: inset(10% 0 60% 0); }
            1%, 96% { clip-path: inset(40% 0 30% 0); }
            2%, 97% { clip-path: inset(70% 0 20% 0); }
            3%, 98% { clip-path: inset(20% 0 50% 0); }
            4%, 99% { clip-path: inset(80% 0 10% 0); }
            5%, 100% { clip-path: inset(0 0 0 0); }
        }
        @keyframes glitch-skew {
            0%, 95% { transform: skew(2deg); }
            1%, 96% { transform: skew(-2deg); }
            2%, 97% { transform: skew(4deg); }
            3%, 98% { transform: skew(-1deg); }
            4%, 99% { transform: skew(3deg); }
            5%, 100% { transform: skew(0deg); }
        }
        /* ========================================= */


        p.subtitle {
            text-align: center; color: var(--text-muted); margin-bottom: 35px;
            font-size: 0.95rem; font-weight: 500;
        }

        /* --- Styles du Formulaire --- */
        .form-group { margin-bottom: 22px; }
        label {
            display: block; margin-bottom: 8px; color: var(--text-light);
            font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase;
        }
        input, textarea {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 8px; color: var(--text-light);
            font-family: 'Red Hat Display', sans-serif; font-weight: 500;
            font-size: 1rem; transition: all 0.2s ease;
        }
        textarea { resize: vertical; height: 120px; }
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.3); }
        input:focus, textarea:focus {
            outline: none; border-color: var(--primary-red);
            background: rgba(255, 51, 51, 0.05);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.3), inset 0 0 10px rgba(255, 51, 51, 0.1);
        }

        /* --- Le Bouton avec Glitch au survol --- */
        button.submit-btn {
            width: 100%; padding: 16px; margin-top: 10px;
            border-radius: 8px; border: none;
            background: linear-gradient(135deg, var(--deep-crimson) 0%, #a10505 100%);
            color: #fff; font-family: 'Red Hat Display', sans-serif;
            font-size: 1.1rem; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer;
            transition: all 0.2s ease; position: relative;
            box-shadow: 0 4px 15px rgba(138, 3, 3, 0.4);
            overflow: hidden;
        }

        button.submit-btn:hover {
            background: linear-gradient(135deg, #a10505 0%, var(--primary-red) 100%);
            box-shadow: 0 6px 25px rgba(255, 51, 51, 0.6);
            /* Petit effet de vibration chromatique au survol */
            animation: button-flicker 0.2s infinite;
        }
        
        @keyframes button-flicker {
            0% { text-shadow: 1px 0 0 var(--primary-red), -1px 0 0 var(--glitch-cyan); }
            50% { text-shadow: -1px 0 0 var(--primary-red), 1px 0 0 var(--glitch-cyan); }
            100% { text-shadow: 1px 0 0 var(--primary-red), -1px 0 0 var(--glitch-cyan); }
        }

        button.submit-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="dark-background"></div>

    <div class="contact-card">
        <h1 class="glitch-title" data-text="CONTACT">CONTACT</h1>
        <p class="subtitle">Initialisation du protocole de communication.</p>

        <form action="/contact" method="POST">
            <div class="form-group">
                <label for="nom">Identifiant / Nom</label>
                <input type="text" id="nom" name="nom" required placeholder="Ex: Neo">
            </div>

            <div class="form-group">
                <label for="email">Canal Email</label>
                <input type="email" id="email" name="email" required placeholder="matrix@exemple.com">
            </div>

            <div class="form-group">
                <label for="message">Transmission de données</label>
                <textarea id="message" name="message" required placeholder="Entrez votre message crypté..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Envoyer la transmission</button>
        </form>
    </div>

</body>
</html>
