<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Colonnes</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    #chart { width: 100%; height: 520px; }
    #status { margin-top: 12px; white-space: pre-wrap; color: #555; font-style: italic; }
  </style>
</head>

<body>
  <h1>Températures horaires — Paris</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    let cachedRows = null;

    async function init() {
      try {
        // Remplacement par notre fonction de fausses données pour le test
        const rows = await fetchMockData();
        cachedRows = rows;
        drawChart(rows);

        window.addEventListener('resize', () => {
          if (cachedRows) drawChart(cachedRows);
        });
      } catch (err) {
        showStatus("Erreur: " + (err?.message || err));
        console.error(err);
      }
    }

    // --- Fonction modifiée pour générer de fausses données instantanément ---
    async function fetchMockData() {
      // On simule ce que votre serveur aurait renvoyé (JSON)
      const mockJson = [
        { datetime: "2026-02-23T08:00", temperature_c: 4.5 },
        { datetime: "2026-02-23T10:00", temperature_c: 7.2 },
        { datetime: "2026-02-23T12:00", temperature_c: 11.0 },
        { datetime: "2026-02-23T14:00", temperature_c: 13.5 },
        { datetime: "2026-02-23T16:00", temperature_c: 12.8 },
        { datetime: "2026-02-23T18:00", temperature_c: 9.1 }
      ];

      const rows = mockJson.map(p => {
        const dt = toDate(p.datetime);
        const temp = Number(p.temperature_c);
        return [dt, temp];
      });

      return rows;
    }

    function toDate(isoLike) {
      const [datePart, timePart] = isoLike.split('T');
      const [y, m, d] = datePart.split('-').map(Number);
      const [hh, mm] = timePart.split(':').map(Number);
      return new Date(y, m - 1, d, hh, mm, 0);
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Heure');
      data.addColumn('number', 'Température (°C)');
      data.addRows(rows);

      // --- Les options ajustées pour un diagramme à colonnes ---
      const options = {
        title: 'Évolution de la température à Paris',
        legend: { position: 'none' }, // On cache la légende (inutile pour une seule série)
        colors: ['#4285F4'], // Un joli bleu classique de Google
        hAxis: {
          title: 'Heure',
          format: 'HH:mm', // On affiche juste l'heure pour plus de clarté
          gridlines: { count: -1 } 
        },
        vAxis: {
          title: 'Température (°C)'
        },
        bar: { groupWidth: '60%' }, // Épaisseur des colonnes
        animation: {
          startup: true,
          duration: 1000,
          easing: 'out'
        }
      };

      // --- LE CHANGEMENT MAJEUR EST ICI : ColumnChart au lieu de LineChart ---
      const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
      chart.draw(data, options);

      showStatus(`OK — ${rows.length} points affichés.`);
    }

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
